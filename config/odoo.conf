[options]
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

; Admin password for database manager (change this!)
admin_passwd = admin_master_password

; Performance
; workers = 0 for first run / single-process; set to 2+ after DB is created
workers = 0
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 60
limit_time_real = 120

; Logging
logfile = /var/log/odoo/odoo.log
log_level = info

; Longpolling (live chat, bus)
longpolling_port = 8072

; Proxy mode (enable if behind nginx/traefik)
proxy_mode = True
